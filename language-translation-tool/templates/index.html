<!DOCTYPE html>
<html>

<head>
    <title>AI Language Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">
        <h1>🌐 AI Language Translator</h1>

        <form method="POST">
            <textarea name="text" placeholder="Enter text here..." required></textarea>

            <p style="color:red;">*Enter simple sentences like 'hello', 'how are you'</p>
            <div class="selectors">
                <label>From:</label>
                <select name="source">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
            </select>

                <label>To:</label>
                <select name="target">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
            </select>
            </div>

            <button type="submit">Translate</button>
        </form>

        {% if translated_text %}
        <div class="output">
            <h3>Translated Result:</h3>
            <p id="result">{{ translated_text }}</p>
            <button onclick="copyText()">Copy</button>
        </div>
        {% endif %}
    </div>

    <script>
        function copyText() {
            let text = document.getElementById("result").innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>

</body>

</html>
